<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Dealer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .form-label {
            font-weight: 500;
        }

        .btn-success {
            background-color: #28a745;
        }
        .col-form-label {
    font-weight: 500;
}

.form-control {
    width: 100%;
    border-radius: 6px;
}
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card p-4">
                <h4 class="mb-4">➕ Add New Dealer</h4>
<form method="post">
    {% csrf_token %}

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Dealer ID</label>
        <div class="col-sm-8">
            {{ form.dealer_id }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Name</label>
        <div class="col-sm-8">
            {{ form.name }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Contact Person</label>
        <div class="col-sm-8">
            {{ form.contact_person }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Email</label>
        <div class="col-sm-8">
            {{ form.email }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Phone</label>
        <div class="col-sm-8">
            {{ form.phone }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">City</label>
        <div class="col-sm-8">
            {{ form.city }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">State</label>
        <div class="col-sm-8">
            {{ form.state }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Postal Code</label>
        <div class="col-sm-8">
            {{ form.postal_code }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Address</label>
        <div class="col-sm-8">
            {{ form.address }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Country</label>
        <div class="col-sm-8">
            {{ form.country }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <label class="col-sm-4 col-form-label">Commission %</label>
        <div class="col-sm-8">
            {{ form.commission_percentage }}
        </div>
    </div>

    <div class="mb-3 row align-items-center">
        <div class="col-sm-4"></div>
        <div class="col-sm-8 form-check">
            {{ form.is_active }}
            <label class="form-check-label">Active</label>
        </div>
    </div>

    <button type="submit" class="btn btn-success w-100">
        Save Dealer
    </button>

</form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
